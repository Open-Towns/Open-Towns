name: Release Target Builds

on:
  push:
    tags:
      - 'v*.*.*'
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

env:
  APP_NAME: TownsForever

jobs:
  build-windows-x64:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve release version
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RELEASE_ARCHIVE=$env:APP_NAME-$version-windows-x64.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build Windows release archive
        shell: pwsh
        run: .\gradlew.bat zipWindowsAppImage "-Ptowns.packageVersion=$env:RELEASE_VERSION"

      - name: Verify release archive
        shell: pwsh
        run: |
          $archive = "build/release/$env:RELEASE_ARCHIVE"
          if (!(Test-Path $archive)) {
            throw "Release archive was not created: $archive"
          }
          Get-Item $archive | Format-List FullName, Length

      - name: Upload Windows target artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-release
          path: build/release/TownsForever-*-windows-x64.zip
          if-no-files-found: error

  build-linux-x64:
    name: Build Linux x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve release version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "RELEASE_ARCHIVE=${APP_NAME}-${version}-linux-x64.tar.gz" >> "$GITHUB_ENV"

      - name: Build Linux release archive
        shell: bash
        run: bash gradlew zipLinuxAppImage "-Ptowns.packageVersion=${RELEASE_VERSION}"

      - name: Verify release archive
        shell: bash
        run: |
          archive="build/release/${RELEASE_ARCHIVE}"
          if [ ! -f "$archive" ]; then
            echo "Release archive was not created: $archive" >&2
            exit 1
          fi
          ls -lh "$archive"

      - name: Upload Linux target artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-release
          path: build/release/TownsForever-*-linux-x64.tar.gz
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows-x64
      - build-linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download target artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List target artifacts
        shell: bash
        run: ls -lh release-assets

      - name: Write release notes
        shell: bash
        run: |
          cat > release-notes.md <<'NOTES'
          Targeted builds for this release:

          - Windows x64 Steam-compatible portable archive
          - Linux x64 portable archive

          The automatic GitHub source archives may still appear on the release, but the intended downloads are the platform build assets above.

          Release archives intentionally do not include original Towns art/audio/font assets or Steam DLLs. For local Steam testing, overlay your legally owned original install data/lib folders into the package root.
          NOTES

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release-assets/* --clobber
            gh release edit "$tag" --notes-file release-notes.md --title "${APP_NAME} ${tag#v}"
          else
            gh release create "$tag" release-assets/* --verify-tag --title "${APP_NAME} ${tag#v}" --notes-file release-notes.md
          fi
