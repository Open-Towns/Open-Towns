name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  windows-steam-build:
    name: Windows Steam-compatible build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve release version
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RELEASE_ARCHIVE=Towns-$version-windows-x64.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build Windows release archive
        shell: pwsh
        run: .\gradlew.bat zipWindowsAppImage "-Ptowns.packageVersion=$env:RELEASE_VERSION"

      - name: Verify release archive
        shell: pwsh
        run: |
          $archive = "build/release/$env:RELEASE_ARCHIVE"
          if (!(Test-Path $archive)) {
            throw "Release archive was not created: $archive"
          }
          Get-Item $archive | Format-List FullName, Length

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $archive = "build/release/$env:RELEASE_ARCHIVE"
          $notes = @"
          Windows Steam-compatible build for $env:GITHUB_REF_NAME.

          This archive intentionally does not include original Towns art/audio/font assets or Steam DLLs.
          For local Steam testing, overlay your legally owned original install data/lib folders into the package root.
          "@
          gh release view "$env:GITHUB_REF_NAME" *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload "$env:GITHUB_REF_NAME" $archive --clobber
          } else {
            gh release create "$env:GITHUB_REF_NAME" $archive --title "Towns $env:RELEASE_VERSION" --notes $notes
          }
