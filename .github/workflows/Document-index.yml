name: Update Repository Docs Index

"on":
  push:
    branches:
      - main
    paths:
      - README.md
      - docs/*.md
      - docs/**/*.md
      - .github/workflows/Document-index.yml
      - "!docs/REPOSITORY_DOCS_INDEX.md"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-index-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-docs-index:
    name: Update docs index
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate docs index
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          OUT="docs/REPOSITORY_DOCS_INDEX.md"
          REPO_URL="${GITHUB_SERVER_URL:-https://github.com}/${GITHUB_REPOSITORY}/blob/main"

          mkdir -p "$(dirname "$OUT")"

          pretty_name() {
            local file="$1"
            local title_name

            title_name="$(basename "$file" .md)"
            echo "$title_name" | sed 's/-/ /g; s/_/ /g; s/\([a-z]\)\([A-Z]\)/\1 \2/g'
          }

          doc_purpose() {
            local file="$1"
            local purpose

            case "$file" in
              README.md)
                echo "Main project overview, install notes, and Gradle quick start."
                return
                ;;
              docs/CHANGELOG.md)
                echo "Historic Towns patch notes and release changes."
                return
                ;;
              docs/getting-started/PRTemplate.md)
                echo "Reusable pull request template for contributors."
                return
                ;;
            esac

            purpose="$(awk '
              BEGIN { in_fence = 0 }
              /^[[:space:]]*```/ { in_fence = !in_fence; next }
              in_fence { next }
              /^[[:space:]]*$/ { next }
              /^[[:space:]]*#/ { next }
              /^[[:space:]]*[-*_]{3,}[[:space:]]*$/ { next }
              { print; exit }
            ' "$file" | sed 's/|/\\|/g')"

            if [ -z "$purpose" ]; then
              purpose="Documentation for $(pretty_name "$file")."
            fi

            echo "$purpose"
          }

          add_doc_row() {
            local file="$1"
            local purpose="$2"

            printf '| [`%s`](%s/%s) | %s |\n' "$file" "$REPO_URL" "$file" "$purpose" >> "$OUT"
          }

          start_section() {
            local title="$1"

            {
              echo ""
              echo "## $title"
              echo "| Document | Purpose |"
              echo "|---|---|"
            } >> "$OUT"
          }

          add_section() {
            local title="$1"
            local folder="$2"
            local files=("$folder"/*.md)
            local file

            start_section "$title"

            if [ "${#files[@]}" -eq 0 ]; then
              echo "| No documents yet | This category does not have repository docs yet. |" >> "$OUT"
              return
            fi

            for file in "${files[@]}"; do
              add_doc_row "$file" "$(doc_purpose "$file")"
            done
          }

          cat > "$OUT" <<'EOF'
          # Repository Docs Index

          This page tracks documentation files that live in the Open-Towns repository.

          Repository docs are used for technical documentation that should stay close to the code. Wiki pages can link here, summarize the details, and help contributors find the right source document.

          > Generated by `.github/workflows/Document-index.yml`. Do not edit this file by hand.

          ---

          # Current docs
          EOF

          sed -i 's/^          //' "$OUT"

          start_section "Repository"
          add_doc_row "README.md" "$(doc_purpose "README.md")"

          for file in docs/*.md; do
            if [ "$file" = "$OUT" ]; then
              continue
            fi

            add_doc_row "$file" "$(doc_purpose "$file")"
          done

          add_section "Getting Started" "docs/getting-started"
          add_section "Modding" "docs/modding"
          add_section "Systems" "docs/systems"

          cat >> "$OUT" <<'EOF'

          ---

          # How to add repo docs

          When adding a new documentation file:

          1. Choose the correct documentation category:
             - `docs/getting-started/` for setup, build, run, and first-time contributor docs.
             - `docs/modding/` for modding, Towns++, data override, and mod compatibility docs.
             - `docs/systems/` for code systems, managers, architecture, gameplay logic, and implementation details.
          2. Add the file under the matching category folder.
          3. Use a clear filename that matches the local style of that folder.
          4. Start the file with a heading and a short first paragraph that explains the document purpose.
          5. Let this workflow update the Repository Docs Index automatically.
          6. Use the Wiki for navigation, summaries, and contributor-friendly explanations.

          If a document does not clearly fit one of the current categories, discuss whether a new category is needed before adding it.

          ---

          # Documentation rule

          Use this layout:

          ```text
          README = short project overview
          docs/ = technical code documentation
          Wiki = documentation index, summaries, and contributor navigation
          ```
          EOF

          sed -i 's/^          //' "$OUT"

      - name: Commit updated docs index
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH="docs/update-repository-docs-index"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/REPOSITORY_DOCS_INDEX.md

          if git diff --cached --quiet -- docs/REPOSITORY_DOCS_INDEX.md; then
            echo "No docs index changes."
            exit 0
          fi

          git commit -m "Update repository docs index"
          git push --force origin "HEAD:refs/heads/$BRANCH"

          pr_number="$(gh pr list \
            --head "$BRANCH" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "$pr_number" ]; then
            echo "Docs index PR #$pr_number already exists."
            exit 0
          fi

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Update repository docs index" \
            --body "Automated update for \`docs/REPOSITORY_DOCS_INDEX.md\` after repository documentation changed."
