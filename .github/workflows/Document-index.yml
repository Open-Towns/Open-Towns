name: Update Repository Docs Index

"on":
  push:
    branches:
      - main
      - Dev
    paths:
      - README.md
      - docs/*.md
      - docs/**/*.md
      - .github/workflows/Document-index.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-index-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-docs-index:
    name: Update docs index
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate docs index
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          OUT="${RUNNER_TEMP}/REPOSITORY_DOCS_INDEX.md"
          WIKI_URL="${GITHUB_SERVER_URL:-https://github.com}/${GITHUB_REPOSITORY}/wiki"

          pretty_name() {
            local file="$1"
            local title_name

            title_name="$(basename "$file" .md)"
            echo "$title_name" | sed 's/-/ /g; s/_/ /g; s/\([a-z]\)\([A-Z]\)/\1 \2/g'
          }

          wiki_page_name() {
            local file="$1"
            local base

            base="$(basename "$file" .md)"

            case "$file" in
              README.md)
                echo "Repository-README"
                ;;
              docs/getting-started/*)
                echo "Getting-Started-$base"
                ;;
              docs/modding/*)
                echo "Modding-$base"
                ;;
              docs/systems/*)
                echo "Systems-$base"
                ;;
              docs/*)
                echo "Docs-$base"
                ;;
            esac
          }

          doc_purpose() {
            local file="$1"
            local purpose

            case "$file" in
              README.md)
                echo "Main project overview, install notes, and Gradle quick start."
                return
                ;;
              docs/CHANGELOG.md)
                echo "Historic Towns patch notes and release changes."
                return
                ;;
              docs/getting-started/PRTemplate.md)
                echo "Reusable pull request template for contributors."
                return
                ;;
            esac

            purpose="$(awk '
              BEGIN { in_fence = 0 }
              /^[[:space:]]*```/ { in_fence = !in_fence; next }
              in_fence { next }
              /^[[:space:]]*$/ { next }
              /^[[:space:]]*#/ { next }
              /^[[:space:]]*[-*_]{3,}[[:space:]]*$/ { next }
              { print; exit }
            ' "$file" | sed 's/|/\\|/g')"

            if [ -z "$purpose" ]; then
              purpose="Documentation for $(pretty_name "$file")."
            fi

            echo "$purpose"
          }

          add_doc_row() {
            local file="$1"
            local purpose="$2"

            printf '| [`%s`](%s/%s) | %s |\n' "$file" "$WIKI_URL" "$(wiki_page_name "$file")" "$purpose" >> "$OUT"
          }

          start_section() {
            local title="$1"

            {
              echo ""
              echo "## $title"
              echo "| Document | Purpose |"
              echo "|---|---|"
            } >> "$OUT"
          }

          add_section() {
            local title="$1"
            local folder="$2"
            local files=("$folder"/*.md)
            local file

            start_section "$title"

            if [ "${#files[@]}" -eq 0 ]; then
              echo "| No documents yet | This category does not have repository docs yet. |" >> "$OUT"
              return
            fi

            for file in "${files[@]}"; do
              add_doc_row "$file" "$(doc_purpose "$file")"
            done
          }

          cat > "$OUT" <<'EOF'
          <!-- Generated by .github/workflows/Document-index.yml. Do not edit this wiki page by hand. -->

          # Repository Docs Index

          This wiki page tracks documentation files that live in the Open-Towns repository.

          Repository docs are used for technical documentation that should stay close to the code. Wiki pages can link here, summarize the details, and help contributors find the right source document.

          > Generated by `.github/workflows/Document-index.yml`. Do not edit this wiki page by hand.

          ---

          # Current docs
          EOF

          sed -i 's/^          //' "$OUT"

          start_section "Repository"
          add_doc_row "README.md" "$(doc_purpose "README.md")"

          for file in docs/*.md; do
            if [ "$file" = "$OUT" ]; then
              continue
            fi

            add_doc_row "$file" "$(doc_purpose "$file")"
          done

          add_section "Getting Started" "docs/getting-started"
          add_section "Modding" "docs/modding"
          add_section "Systems" "docs/systems"

          cat >> "$OUT" <<'EOF'

          ---

          # How to add repo docs

          When adding a new documentation file:

          1. Choose the correct documentation category:
             - `docs/getting-started/` for setup, build, run, and first-time contributor docs.
             - `docs/modding/` for modding, Towns++, data override, and mod compatibility docs.
             - `docs/systems/` for code systems, managers, architecture, gameplay logic, and implementation details.
          2. Add the file under the matching category folder.
          3. Use a clear filename that matches the local style of that folder.
          4. Start the file with a heading and a short first paragraph that explains the document purpose.
          5. Let this workflow update the Repository Docs Index automatically.
          6. Use the Wiki for navigation, summaries, and contributor-friendly explanations.

          If a document does not clearly fit one of the current categories, discuss whether a new category is needed before adding it.

          ---

          # Documentation rule

          Use this layout:

          ```text
          README = short project overview
          docs/ = technical code documentation
          Wiki = documentation index, summaries, and contributor navigation
          ```
          EOF

          sed -i 's/^          //' "$OUT"

      - name: Publish docs to wiki
        shell: bash
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_TOKEN || github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          WIKI_PAGE="Repository-Docs-Index.md"
          WIKI_SOURCE="${RUNNER_TEMP}/REPOSITORY_DOCS_INDEX.md"
          WIKI_WORKTREE="$(mktemp -d)"

          trap 'rm -rf "$WIKI_WORKTREE"' EXIT

          git clone "https://x-access-token:${WIKI_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" "$WIKI_WORKTREE"

          cp "$WIKI_SOURCE" "$WIKI_WORKTREE/$WIKI_PAGE"

          wiki_page_name() {
            local file="$1"
            local base

            base="$(basename "$file" .md)"

            case "$file" in
              README.md)
                echo "Repository-README"
                ;;
              docs/getting-started/*)
                echo "Getting-Started-$base"
                ;;
              docs/modding/*)
                echo "Modding-$base"
                ;;
              docs/systems/*)
                echo "Systems-$base"
                ;;
              docs/*)
                echo "Docs-$base"
                ;;
            esac
          }

          publish_doc() {
            local source="$1"
            local page
            local target

            page="$(wiki_page_name "$source").md"
            target="$WIKI_WORKTREE/$page"

            {
              printf '<!-- Generated from %s by .github/workflows/Document-index.yml. Do not edit this wiki page by hand. -->\n\n' "$source"
              cat "$source"
            } > "$target"
          }

          find "$WIKI_WORKTREE" -maxdepth 1 -name '*.md' -print0 \
            | while IFS= read -r -d '' page; do
                if grep -q '<!-- Generated from .* by .github/workflows/Document-index.yml' "$page"; then
                  rm "$page"
                fi
              done

          publish_doc "README.md"

          for file in docs/*.md; do
            if [ "$file" = "docs/REPOSITORY_DOCS_INDEX.md" ]; then
              continue
            fi

            publish_doc "$file"
          done

          for folder in docs/getting-started docs/modding docs/systems; do
            for file in "$folder"/*.md; do
              publish_doc "$file"
            done
          done

          cd "$WIKI_WORKTREE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A -- '*.md'

          if git diff --cached --quiet -- '*.md'; then
            echo "No wiki doc changes."
            exit 0
          fi

          git commit -m "Update repository docs wiki pages"
          git push origin HEAD:master
